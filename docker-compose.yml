# Local + EC2 stack. Secrets and config come from the repo-root .env
# (docker compose reads it automatically for ${VAR} interpolation).
#
#   docker compose up --build
#
# Services:
#   mcp      - MCP tool server (ticket_lookup, knowledge_base_search, send_email)
#   backend  - FastAPI + LangGraph agent; talks to mcp over the compose network
#   frontend - nginx serving the built React app

services:
  mcp:
    build: ./backend
    command: python -m mcp_servers.server
    environment:
      MCP_HOST: 0.0.0.0
      MCP_PORT: "8100"
      LANGCHAIN_TRACING_V2: "false"   # tool server itself makes no LLM calls
    expose:
      - "8100"
    restart: unless-stopped

  backend:
    build: ./backend
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    environment:
      MCP_SERVER_URL: http://mcp:8100/mcp
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:?set ANTHROPIC_API_KEY in .env}
      LANGCHAIN_API_KEY: ${LANGCHAIN_API_KEY:-}
      LANGCHAIN_TRACING_V2: ${LANGCHAIN_TRACING_V2:-true}
      LANGCHAIN_PROJECT: ${LANGCHAIN_PROJECT:-support-triage-agent}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
    ports:
      - "8000:8000"
    depends_on:
      - mcp
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        # Host-reachable backend URL baked into the SPA at build time.
        VITE_API_BASE: ${VITE_API_BASE:-http://localhost:8000}
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
